name: Deploy Registry

on:
  push:
    branches:
      - main
    paths:
      - 'packages/ui-web/registry.json'
      - 'packages/ui-web/registry/**'
      - 'packages/ui-ink/registry.json'
      - 'packages/ui-ink/registry/**'
      - '.github/workflows/deploy-registry.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --filter @stackory/ui-web build
      - run: pnpm --filter @stackory/ui-ink build
      - name: Merge registries
        run: |
          mkdir -p _site/r/ui-web _site/r/ui-ink
          cp -r packages/ui-web/dist/r/* _site/r/ui-web/
          cp -r packages/ui-ink/dist/r/* _site/r/ui-ink/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run monosync
      - run: pnpm check:affected
        if: github.head_ref != 'changeset-release/main'
      - run: pnpm changeset status --since=origin/main --verbose
        if: github.head_ref != 'changeset-release/main' && !startsWith(github.head_ref, 'improvement-scheduled-monosync-update-')
